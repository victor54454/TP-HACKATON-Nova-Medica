# =============================================================
#  H-SECURE — Architecture Zero-Trust (Hackathon KEYCE 26)
#  Client : Nova-Médica
#  Stack  : React/Vite + FastAPI + PostgreSQL
# =============================================================
#
#  Réseaux :
#    frontend-net  → Frontend <-> Backend  (HTTP)
#    backend-net   → Backend  <-> Database (privé, jamais exposé)
#
# =============================================================

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true

volumes:
  postgres-data:

services:

  # ----------------------------------------------------------
  # 1. FRONTEND — React / Vite
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hsecure-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"           # seul port public exposé côté front
    environment:
      - VITE_API_URL=http://backend:8000
    networks:
      - frontend-net
    depends_on:
      - backend

  # ----------------------------------------------------------
  # 2. BACKEND — FastAPI (Python)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hsecure-backend
    restart: unless-stopped
    ports:
      - "8000:8000"           # exposé uniquement pour Postman / démo
    environment:
      - DATABASE_URL=postgresql://hsecure_user:${DB_PASSWORD}@database:5432/hsecure_db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=30
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    networks:
      - frontend-net          # parle au frontend
      - backend-net           # parle à la DB
    depends_on:
      database:
        condition: service_healthy

  # ----------------------------------------------------------
  # 3. DATABASE — PostgreSQL (réseau interne uniquement)
  # ----------------------------------------------------------
  database:
    image: postgres:15-alpine
    container_name: hsecure-database
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hsecure_db
      - POSTGRES_USER=hsecure_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsecure_user -d hsecure_db"]
      interval: 10s
      timeout: 5s
      retries: 5