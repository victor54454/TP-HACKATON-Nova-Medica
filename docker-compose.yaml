#  H-SECURE — Architecture Zero-Trust (Hackathon KEYCE 26)
#  Client : Nova-Médica
#  Stack  : Next.js + nginx + FastAPI + PostgreSQL
#
#  Réseaux :
#    frontend-net  → nginx <-> frontend-app <-> backend  (HTTP)
#    backend-net   → backend <-> database   (privé, jamais exposé)
#    monitoring-net → dozzle uniquement (isolé)
#
#  Hardening appliqué sur chaque service :
#    - no-new-privileges : empêche l'escalade de privilèges
#    - cap_drop ALL      : suppression de toutes les capabilities Linux
#    - utilisateur non-root dans chaque image applicative


networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true 
  monitoring-net:
    driver: bridge
    #internal: true 

volumes:
  postgres-data:

services:

  # FRONTEND-NGINX (reverse proxy)
  frontend-nginx:
    image: dhi.io/nginx:1.30-debian12
    container_name: hsecure-frontend
    restart: unless-stopped
    ports:
      - "443:8443"
      - "80:8080"
      - "127.0.0.1:8000:8001"  
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/certs:/etc/nginx/certs:ro
    networks:
      - frontend-net
    depends_on:
      - frontend-app
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  # FRONTEND-APP (réseau interne)
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL du backend telle que vue par le navigateur (localhost = hôte Docker)
        NEXT_PUBLIC_API_URL: https://localhost/api
    container_name: hsecure-frontend-app
    restart: unless-stopped
    networks:
      - frontend-net
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  # BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hsecure-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://hsecure_user:${DB_PASSWORD}@database:5432/hsecure_db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=30
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    networks:
      - frontend-net
      - backend-net
    depends_on:
      database:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

  # DOZZLE — UI logs temps réel (port 8888)
  dozzle:
    image: amir20/dozzle:latest
    container_name: hsecure-dozzle
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"   
    volumes:
    # lecture seule
      - /var/run/docker.sock:/var/run/docker.sock:ro   
    environment:
      # affiche uniquement les containers H-Secure
      - DOZZLE_FILTER=name=hsecure                   
      - DOZZLE_LEVEL=info
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.10"
    networks:
      - monitoring-net


  # DATABASE — PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: hsecure-database
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hsecure_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/00_setup.sh:/docker-entrypoint-initdb.d/00_setup.sh
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    networks:
    # uniquement backend-net invisible depuis frontend
      - backend-net           
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hsecure_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
