# =============================================================
#  H-SECURE — Architecture Zero-Trust (Hackathon KEYCE 26)
#  Client : Nova-Médica
#  Stack  : Next.js + nginx + FastAPI + PostgreSQL
# =============================================================
#
#  Réseaux :
#    frontend-net  → nginx <-> frontend-app <-> backend  (HTTP)
#    backend-net   → backend <-> database   (privé, jamais exposé)
#    monitoring-net → dozzle uniquement (isolé)
#
#  Hardening appliqué sur chaque service :
#    - no-new-privileges : empêche l'escalade de privilèges
#    - cap_drop ALL      : suppression de toutes les capabilities Linux
#    - utilisateur non-root dans chaque image applicative
# =============================================================

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true 
  monitoring-net:
    driver: bridge
    #internal: true 

volumes:
  postgres-data:

services:

  # ----------------------------------------------------------
  # 1. FRONTEND-NGINX — Reverse proxy (seul port public front)
  # ----------------------------------------------------------
  frontend-nginx:
    image: nginx:1.27-alpine
    container_name: hsecure-frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend-net
    depends_on:
      - frontend-app
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------
  # 2. FRONTEND-APP — Next.js (réseau interne, non exposé)
  # ----------------------------------------------------------
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL du backend telle que vue par le navigateur (localhost = hôte Docker)
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    container_name: hsecure-frontend-app
    restart: unless-stopped
    networks:
      - frontend-net
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ----------------------------------------------------------
  # 3. BACKEND — FastAPI (Python)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hsecure-backend
    restart: unless-stopped
    ports:
      - "8000:8000"         # exposé pour Postman / démo jury
    environment:
      - DATABASE_URL=postgresql://hsecure_user:${DB_PASSWORD}@database:5432/hsecure_db
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=30
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    networks:
      - frontend-net
      - backend-net
    depends_on:
      database:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ----------------------------------------------------------
  # 4. DOZZLE — UI logs temps réel (port 8888)
  # ----------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: hsecure-dozzle
    restart: unless-stopped
    ports:
      - "8888:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro   # lecture seule
    environment:
      - DOZZLE_FILTER=name=hsecure                     # affiche uniquement les containers H-Secure
      - DOZZLE_LEVEL=info
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring-net

  # ----------------------------------------------------------
  # 5. DATABASE — PostgreSQL (réseau interne uniquement)
  # ----------------------------------------------------------
  database:
    image: postgres:15-alpine
    container_name: hsecure-database
    restart: unless-stopped
    environment:
      - POSTGRES_DB=hsecure_db
      - POSTGRES_USER=hsecure_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-net           # uniquement backend-net — invisible depuis frontend (Test A ✅)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hsecure_user -d hsecure_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
