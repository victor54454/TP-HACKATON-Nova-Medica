upstream frontend_app {
    server frontend-app:3000;
    keepalive 32;
}

# HTTP → HTTPS redirect
resolver 127.0.0.11 valid=10s ipv6=off;

# Anti-Slowloris: abort clients that stall during header/body read
# (keepalive_timeout omis ici — déjà défini dans nginx.conf http{} ;
#  on le redéfinit dans chaque server{} pour l'abaisser à 15s)
client_header_timeout 10s;
client_body_timeout   10s;
send_timeout          10s;

# Connection limiting per IP (Slowloris requires many open connections)
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

server {
    listen 8080;
    server_name _;
    keepalive_timeout 15s;
    limit_conn per_ip 20;
    return 301 https://$host$request_uri;
}

# Port 8001 interne — API directe HTTP (Postman / démo jury)
# Uvicorn n'est plus exposé directement : nginx applique les
# protections anti-Slowloris avant de proxier vers le backend.
server {
    listen 8001;
    server_name _;
    keepalive_timeout 15s;
    limit_conn per_ip 20;
    server_tokens off;

    location / {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;
        proxy_connect_timeout  5s;
    }
}

server {
    listen 8443 ssl;
    server_name _;
    keepalive_timeout 15s;
    limit_conn per_ip 20;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;

    # ── Security headers ───────────────────────────────────────
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options             "DENY"                                 always;
    add_header X-Content-Type-Options      "nosniff"                             always;
    add_header X-XSS-Protection            "1; mode=block"                       always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy              "geolocation=(), microphone=()"       always;
    add_header Content-Security-Policy         "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self';" always;
    add_header Cross-Origin-Embedder-Policy    "require-corp"                        always;
    add_header Cross-Origin-Opener-Policy      "same-origin"                         always;
    add_header Cross-Origin-Resource-Policy    "same-origin"                         always;
    add_header Cache-Control                   "no-store, no-cache, must-revalidate" always;

    # ── Reverse proxy → API backend ────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Reverse proxy → Next.js ────────────────────────────────
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache_bypass $http_upgrade;
    }
}
